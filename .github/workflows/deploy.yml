name: Deploy MariAntri

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build Go binary
        working-directory: backend
        run: GOOS=linux GOARCH=amd64 go build -o main .

      - name: Copy binary to FE
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.FE_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/main,backend/Dockerfile"
          target: "/tmp/be-deploy"
          strip_components: 1

      - name: Deploy BE via FE jump
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.FE_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            scp -i ~/mari-antri-key-pair.pem -o StrictHostKeyChecking=no \
              /tmp/be-deploy/main /tmp/be-deploy/Dockerfile \
              ubuntu@${{ secrets.BE_HOST }}:/app/mari-antri/backend/
            ssh -i ~/mari-antri-key-pair.pem -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.BE_HOST }} 'bash -s' << 'ENDSSH'
            chmod +x /app/mari-antri/backend/main
            cd /app/mari-antri/backend
            docker build -t mari-antri-be .
            docker stop mari-antri-be || true
            docker rm mari-antri-be || true
            docker run -d \
              --name mari-antri-be \
              --restart always \
              -p 8080:8080 \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASS=${{ secrets.DB_PASS }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e S3_BUCKET=${{ secrets.S3_BUCKET }} \
              mari-antri-be
            ENDSSH

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v3

      - name: Deploy FE to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.FE_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/mari-antri/frontend
            git pull origin main
            docker build \
              --build-arg VITE_API_URL=http://${{ secrets.BE_PRIVATE_IP }}:8080 \
              -t mari-antri-fe .
            docker stop mari-antri-fe || true
            docker rm mari-antri-fe || true
            docker run -d \
              --name mari-antri-fe \
              --restart always \
              -p 80:80 \
              mari-antri-fe